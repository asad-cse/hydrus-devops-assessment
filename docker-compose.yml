services:
  db:
    image: postgres:16-alpine
    container_name: hydrus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hydrus}
      POSTGRES_USER: ${DB_USER:-hydrus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hydrus_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hydrus} -d ${DB_NAME:-hydrus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [hydrus-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hydrus-backend:local
    container_name: hydrus-backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-hydrus}
      DB_USER: ${DB_USER:-hydrus}
      DB_PASSWORD: ${DB_PASSWORD:-hydrus_pass}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:8080"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks: [hydrus-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    image: hydrus-frontend:local
    container_name: hydrus-frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "8080:8080"
    networks: [hydrus-net]

volumes:
  pgdata:

networks:
  hydrus-net:
    driver: bridge
