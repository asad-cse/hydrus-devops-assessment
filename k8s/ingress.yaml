apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hydrus-ingress
  namespace: hydrus
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: hydrus.example.com   #
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port: { number: 80 }
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port: { number: 80 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 80 }
