apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hydrus
  labels: { app: backend }
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: REPLACE_ACR_LOGIN_SERVER/hydrus-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: backend-config }
            - secretRef:    { name: backend-secret }
          readinessProbe:
            httpGet:  { path: /ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:  { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
